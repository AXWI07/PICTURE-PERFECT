<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picture Perfect Fotografie</title>

  <!-- Fonts: Anton for the big headline, Inter for body text -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HEADER / NAVBAR ===== -->
  <header class="site-header">
    <a href="#" class="logo">PICTURE PERFECT</a>

    <button class="hamburger" aria-label="Menu openen" aria-expanded="false" aria-controls="site-nav">
      <span class="hamburger__line"></span>
      <span class="hamburger__line"></span>
      <span class="hamburger__line"></span>
    </button>

    <nav class="nav" id="site-nav">
      <ul class="nav__list">
        <li><a href="#over-mij" class="nav__link">OVER MIJ</a></li>
        <li><a href="#portfolio" class="nav__link">PORTFOLIO</a></li>
        <li><a href="#diensten" class="nav__link">DIENSTEN</a></li>
      </ul>
      <a href="#boek-nu" class="cta">BOEK NU</a>
    </nav>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <!-- Drop your image here later. It scales/crops automatically (object-fit: cover),
         so any large photo works. Ideal size: min. 1600px wide, landscape. -->
    <div class="hero__image-wrapper">
      <img src="images/Engels_Liesbeth_Seven-55.jpg" alt="Portret van de fotograaf" class="hero__image">
    </div>

    <div class="hero__content">
      <h1 class="hero__title">
        PICTURE<br>
        PERFECT<br>
        FOTOGRAFIE
      </h1>
      <p class="hero__tagline">
        
      </p>
    </div>
  </section>

  <script src="style.js"></script>
</body>
</html>
